# ==============================================================
# 本地开发环境基础设施
# 仅包含 PostgreSQL + Redis，应用服务用 npm run dev 启动
#
# 用法：
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.dev.yml down
# ==============================================================

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"           # 对宿主机暴露，方便本地连接
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medusa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medusa_dev_pass}
      POSTGRES_DB: ${POSTGRES_DB:-medusa_db}
    volumes:
      - ./data/dev/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medusa}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"           # 对宿主机暴露
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_dev_pass}
      --appendonly yes
      --appendfsync everysec
    volumes:
      - ./data/dev/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev_pass}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
