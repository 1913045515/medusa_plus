# ==============================================================
# Next.js 前端 (Storefront) 域名配置
# 域名示例：yourdomain.com 和 www.yourdomain.com
# ==============================================================

# HTTP → HTTPS 强制跳转（含 www）
server {
    listen 80;
    listen [::]:80;
    server_name wolzq.com www.wolzq.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://www.wolzq.com$request_uri;
    }
}

# 裸域名 → www 跳转
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name wolzq.com;

    ssl_certificate     /etc/nginx/ssl/www.wolzq.com_nginx/www.wolzq.com_bundle.pem;
    ssl_certificate_key /etc/nginx/ssl/www.wolzq.com_nginx/www.wolzq.com.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    return 301 https://www.wolzq.com$request_uri;
}

# HTTPS 主配置
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.wolzq.com;

    # ── SSL 证书 ──────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/www.wolzq.com_nginx/www.wolzq.com_bundle.pem;
    ssl_certificate_key /etc/nginx/ssl/www.wolzq.com_nginx/www.wolzq.com.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # add_header Strict-Transport-Security "max-age=63072000" always;

    # ── 代理到 Next.js 服务 ───────────────────────────────────
    location / {
        proxy_pass http://storefront:8000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 30s;
    }

    # Next.js 静态资源缓存
    location /_next/static/ {
        proxy_pass http://storefront:8000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
