# ==============================================================
# Medusa 后端 (Admin) 域名配置
# 域名示例：api.yourdomain.com
# ==============================================================

# HTTP → HTTPS 强制跳转
server {
    listen 80;
    listen [::]:80;
    server_name admin.wolzq.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 配置
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name admin.wolzq.com;

    # ── SSL 证书 ──────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/admin.wolzq.com_nginx/admin.wolzq.com_bundle.pem;
    ssl_certificate_key /etc/nginx/ssl/admin.wolzq.com_nginx/admin.wolzq.com.key;

    # 推荐的 SSL 安全参数
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS（生产环境建议开启，首次调试完成后取消注释）
    # add_header Strict-Transport-Security "max-age=63072000" always;

    # ── 上传文件静态服务（nginx 直接读取 volume，绕过 Node.js）───────
    # docker-compose 中 nginx 挂载 ./uploads:/var/uploads:ro
    location ^~ /uploads/ {
        alias /var/uploads/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        add_header X-Content-Type-Options nosniff;
        # 允许 next/image 优化器和浏览器跨域访问图片
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods 'GET, OPTIONS';
        add_header Access-Control-Allow-Headers *;
    }

    # ── 代理到 Medusa Admin 服务 ───────────────────────────────
    location / {
        proxy_pass http://admin:9000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 75s;

        # 文件上传大小与后端一致
        client_max_body_size 100M;
    }
}
