# ==============================================================
# 拦截直接 IP 访问（HTTP + HTTPS）
# 优先级最高（文件名 00- 确保最先加载）
# 直接 IP 访问返回 444，nginx 立即断开连接，不返回任何响应
# ==============================================================

# 拦截 HTTP 直接 IP 访问
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    return 444;
}

# 拦截 HTTPS 直接 IP 访问（TLS 握手后立即断开）
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    # 使用任意一个现有证书完成 TLS 握手，握手后立即断开
    ssl_certificate     /etc/nginx/ssl/www.wolzq.com_nginx/www.wolzq.com_bundle.pem;
    ssl_certificate_key /etc/nginx/ssl/www.wolzq.com_nginx/www.wolzq.com.key;

    return 444;
}
