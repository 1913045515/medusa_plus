# ==============================================================
# Docker Compose 测试环境部署配置
# 用法：docker compose --env-file .env -f docker-compose.test.yml up -d
# 说明：部署 PostgreSQL、Redis、Nginx、Admin、Storefront
# ==============================================================

services:

  # ─────────────────── PostgreSQL ───────────────────
  postgres:
    image: hkccr.ccs.tencentyun.com/website-pro/postgresql:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # 测试环境暴露端口便于外部连接调试
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────── Redis ───────────────────
  redis:
    image: hkccr.ccs.tencentyun.com/website-pro/redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfilename appendonly.aof
      --appendfsync everysec
    ports:
      # 测试环境暴露端口便于外部连接调试
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────── Medusa 后端 (Admin) ───────────────────
  admin:
    image: hkccr.ccs.tencentyun.com/website-pro/medusa_plus_pro:${IMAGE_TAG:-latest}
    restart: unless-stopped
    # admin 端口不对外暴露，仅 nginx/storefront 通过 Docker 内网访问
    # ports:
    #   - "9000:9000"
    environment:
      NODE_ENV: test
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECRET: ${COOKIE_SECRET}
      STORE_CORS: ${STORE_CORS}
      ADMIN_CORS: ${ADMIN_CORS}
      AUTH_CORS: ${AUTH_CORS}
      # 本地文件上传：写入挂载卷 /app/uploads，nginx 从 /uploads/ 对外服务
      UPLOAD_DIR: /app/uploads
      BACKEND_URL: ${BACKEND_URL:-https://admin.wolzq.com/uploads}
      # Server-side storefront notification after menu changes (no browser CORS issues)
      STOREFRONT_INTERNAL_URL: http://storefront:8000
      # 课程媒体 S3（私有桶，视频/附件用签名 URL）
      COURSE_MEDIA_S3_BUCKET: ${COURSE_MEDIA_S3_BUCKET}
      COURSE_MEDIA_S3_REGION: ${COURSE_MEDIA_S3_REGION:-ap-southeast-1}
      COURSE_MEDIA_S3_ACCESS_KEY_ID: ${COURSE_MEDIA_S3_ACCESS_KEY_ID}
      COURSE_MEDIA_S3_SECRET_ACCESS_KEY: ${COURSE_MEDIA_S3_SECRET_ACCESS_KEY}
      # 博客/产品富文本图片 S3（公有桶，图片直接公开访问）
      BLOG_MEDIA_S3_BUCKET: ${BLOG_MEDIA_S3_BUCKET}
      BLOG_MEDIA_S3_REGION: ${BLOG_MEDIA_S3_REGION:-ap-southeast-1}
      BLOG_MEDIA_S3_ACCESS_KEY_ID: ${BLOG_MEDIA_S3_ACCESS_KEY_ID}
      BLOG_MEDIA_S3_SECRET_ACCESS_KEY: ${BLOG_MEDIA_S3_SECRET_ACCESS_KEY}
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────── Next.js 前端 (Storefront) ───────────────────
  storefront:
    image: hkccr.ccs.tencentyun.com/website-pro/medusa_plus_front_pro:${IMAGE_TAG:-latest}
    restart: unless-stopped
    # storefront 端口不对外暴露，仅 nginx 通过 Docker 内网访问
    # ports:
    #   - "8000:8000"
    environment:
      NODE_ENV: test
      MEDUSA_BACKEND_URL: http://admin:9000
      NEXT_PUBLIC_MEDUSA_BACKEND_URL: ${NEXT_PUBLIC_MEDUSA_BACKEND_URL}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
      NEXT_PUBLIC_DEFAULT_REGION: ${NEXT_PUBLIC_DEFAULT_REGION:-us}
      NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET}
    depends_on:
      admin:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────── Nginx 反向代理 ───────────────────
  nginx:
    image: hkccr.ccs.tencentyun.com/website-pro/nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
      - ./uploads:/var/uploads:ro
    depends_on:
      - storefront
      - admin
    networks:
      - internal

networks:
  internal:
    driver: bridge
