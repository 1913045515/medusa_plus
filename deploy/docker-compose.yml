# ==============================================================
# Docker Compose 生产环境部署配置
# 用法：docker compose --env-file .env up -d
# ==============================================================

services:

  # ─────────────────── PostgreSQL ───────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      # 数据持久化到宿主机
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────── Redis ───────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # requirepass 设置密码；appendonly yes 开启 AOF 持久化
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfilename appendonly.aof
      --appendfsync everysec
    volumes:
      # AOF 文件持久化到宿主机
      - ./data/redis:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────── Medusa 后端 (Admin) ───────────────────
  admin:
    image: ghcr.io/${GITHUB_REPO}/admin:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECRET: ${COOKIE_SECRET}
      STORE_CORS: ${STORE_CORS}
      ADMIN_CORS: ${ADMIN_CORS}
      AUTH_CORS: ${AUTH_CORS}
    volumes:
      # 上传文件持久化到宿主机
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────── Next.js 前端 (Storefront) ───────────────────
  storefront:
    image: ghcr.io/${GITHUB_REPO}/storefront:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_MEDUSA_BACKEND_URL: ${NEXT_PUBLIC_MEDUSA_BACKEND_URL}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
      NEXT_PUBLIC_DEFAULT_REGION: ${NEXT_PUBLIC_DEFAULT_REGION:-cn}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET}
    depends_on:
      admin:
        condition: service_healthy
    networks:
      - internal

  # ─────────────────── Nginx 反向代理 ───────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Nginx 主配置
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # 各域名配置（按需拆分）
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # SSL 证书目录（宿主机管理）
      - ./nginx/ssl:/etc/nginx/ssl:ro
      # 访问日志持久化
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - admin
      - storefront
    networks:
      - internal

networks:
  internal:
    driver: bridge
