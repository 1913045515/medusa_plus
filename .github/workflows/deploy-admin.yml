# ==============================================================
# CI/CD：构建 Medusa Admin 镜像并部署到生产服务器
#
# 触发条件：push 到 main 分支，且 my-store/** 有文件改动
# 需要在 GitHub 仓库 Settings → Secrets 中配置：
#   SERVER_HOST     - 服务器 IP 或域名
#   SERVER_USER     - SSH 登录用户名
#   SERVER_SSH_KEY  - SSH 私钥（PEM 格式）
#   SERVER_DEPLOY_PATH - 服务器上 deploy/ 目录的绝对路径
# ==============================================================
name: Deploy Admin (Medusa)

on:
  push:
    branches: [main]
    paths:
      - "my-store/**"
      - ".github/workflows/deploy-admin.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/${{ github.event.repository.name }}/admin

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./my-store
          file: ./my-store/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.SERVER_DEPLOY_PATH }}

            # 拉取最新镜像
            IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
            echo "IMAGE_TAG=${IMAGE_TAG}" >> .env

            docker compose pull admin
            docker compose up -d --no-deps admin

            # 等待健康检查通过
            echo "Waiting for admin to be healthy..."
            sleep 15
            docker compose ps admin

            # 运行数据库迁移
            docker compose exec -T admin npm run medusa migrations run

            echo "✅ Admin deployed successfully: ${IMAGE_TAG}"
